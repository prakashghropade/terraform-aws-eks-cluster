<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 680" width="840" height="680" style="background:#0b0f19; font-family:system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.3" />
    </pattern>

    <!-- Gradients -->
    <linearGradient id="vpc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="eks-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="node-on-demand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="node-spot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Glow & Shadow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Markers for arrows -->
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#475569" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#10b981" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0b0f19" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- TITLE SECTION -->
  <g transform="translate(40, 40)">
    <text x="0" y="0" font-size="24" font-weight="800" fill="#f8fafc">AWS EKS Cluster Architecture</text>
    <text x="0" y="24" font-size="14" fill="#94a3b8">Terraform-managed Kubernetes deployment on AWS</text>
  </g>

  <!-- ==================== AWS INFRASTRUCTURE SECTION ==================== -->
  <g transform="translate(40, 90)">
    <!-- AWS Cloud Outer Box -->
    <rect x="0" y="0" width="760" height="570" rx="16" fill="#0f172a" fill-opacity="0.6" stroke="#ff9900" stroke-width="2" filter="url(#glow-orange)" />
    
    <!-- AWS Badge -->
    <rect x="20" y="-12" width="130" height="24" rx="4" fill="#ff9900" />
    <text x="85" y="4" font-size="11.5" font-weight="800" fill="#0b0f19" text-anchor="middle">AWS CLOUD</text>
    <text x="20" y="30" font-size="15" font-weight="700" fill="#ff9900">us-east-1 Region</text>

    <!-- Internet Gateway (IGW) Placement -->
    <g transform="translate(350, 20)">
      <rect x="0" y="0" width="60" height="32" rx="6" fill="#0284c7" stroke="#38bdf8" stroke-width="1.5" />
      <text x="30" y="20" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">IGW</text>
    </g>

    <!-- VPC Box -->
    <g transform="translate(20, 70)">
      <rect x="0" y="0" width="720" height="480" rx="14" fill="#121e36" fill-opacity="0.5" stroke="#06b6d4" stroke-width="2" filter="url(#glow-cyan)" />
      <text x="20" y="25" font-size="14" font-weight="700" fill="#06b6d4">Virtual Private Cloud (VPC)</text>
      <text x="195" y="25" font-size="11" fill="#67e8f9">CIDR: 10.16.0.0/16</text>

      <!-- Active Cluster Info Banner -->
      <g transform="translate(360, 10)">
        <rect x="0" y="0" width="340" height="26" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5" filter="url(#glow-purple)" />
        <text x="170" y="17" font-size="10.5" font-weight="700" fill="#e9d5ff" text-anchor="middle">Add-ons: vpc-cni | coredns | kube-proxy | ebs-csi</text>
      </g>

      <!-- 3 Availability Zones (AZs) Columns -->
      
      <!-- ==================== AZ1: us-east-1a ==================== -->
      <g transform="translate(15, 45)">
        <!-- AZ Border -->
        <rect x="0" y="0" width="220" height="420" rx="10" fill="#1e293b" fill-opacity="0.2" stroke="#475569" stroke-width="1" stroke-dasharray="4 4" />
        <text x="110" y="20" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">Availability Zone: us-east-1a</text>

        <!-- Public Subnet 1 -->
        <g transform="translate(10, 30)">
          <rect x="0" y="0" width="200" height="120" rx="8" fill="#065f46" fill-opacity="0.1" stroke="#34d399" stroke-width="1.5" />
          <text x="10" y="20" font-size="11" font-weight="700" fill="#34d399">Public Subnet 1</text>
          <text x="10" y="34" font-size="10" fill="#a7f3d0">10.16.0.0/20</text>
          
          <!-- NAT Gateway -->
          <g transform="translate(10, 48)">
            <rect x="0" y="0" width="180" height="60" rx="6" fill="#047857" stroke="#10b981" stroke-width="1.5" />
            <text x="90" y="26" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">NAT Gateway</text>
            <text x="90" y="42" font-size="10" fill="#a7f3d0" text-anchor="middle">eip-ngw (elastic ip)</text>
          </g>
        </g>

        <!-- Private Subnet 1 -->
        <g transform="translate(10, 165)">
          <rect x="0" y="0" width="200" height="245" rx="8" fill="#1e3a8a" fill-opacity="0.1" stroke="#3b82f6" stroke-width="1.5" />
          <text x="10" y="20" font-size="11" font-weight="700" fill="#38bdf8">Private Subnet 1</text>
          <text x="10" y="34" font-size="10" fill="#93c5fd">10.16.128.0/20</text>

          <!-- Nodes Container -->
          <!-- On-Demand Worker Node -->
          <g transform="translate(10, 80)">
            <rect x="0" y="0" width="180" height="70" rx="6" fill="#0b1329" stroke="#10b981" stroke-width="1.5" />
            <rect x="0" y="0" width="180" height="6" rx="3" fill="url(#node-on-demand)" />
            <text x="10" y="24" font-size="11" font-weight="800" fill="#e2e8f0">Node: On-Demand</text>
            <text x="10" y="42" font-size="10" fill="#94a3b8">Instance: t3a.medium</text>
            <text x="10" y="56" font-size="9" fill="#10b981" font-weight="600">Status: Running (Desired: 1)</text>
          </g>

          <!-- Spot Worker Node -->
          <g transform="translate(10, 160)">
            <rect x="0" y="0" width="180" height="70" rx="6" fill="#0b1329" stroke="#f59e0b" stroke-width="1.5" />
            <rect x="0" y="0" width="180" height="6" rx="3" fill="url(#node-spot)" />
            <text x="10" y="24" font-size="11" font-weight="800" fill="#e2e8f0">Node: Spot Instance</text>
            <text x="10" y="42" font-size="10" fill="#94a3b8">Instance: c5a / m5a / t3a</text>
            <text x="10" y="56" font-size="9" fill="#f59e0b" font-weight="600">Status: Dynamic Spot Pool</text>
          </g>
        </g>
      </g>

      <!-- ==================== AZ2: us-east-1b ==================== -->
      <g transform="translate(250, 45)">
        <!-- AZ Border -->
        <rect x="0" y="0" width="220" height="420" rx="10" fill="#1e293b" fill-opacity="0.2" stroke="#475569" stroke-width="1" stroke-dasharray="4 4" />
        <text x="110" y="20" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">Availability Zone: us-east-1b</text>

        <!-- Public Subnet 2 -->
        <g transform="translate(10, 30)">
          <rect x="0" y="0" width="200" height="120" rx="8" fill="#065f46" fill-opacity="0.04" stroke="#34d399" stroke-width="1.5" stroke-dasharray="2 2" />
          <text x="10" y="20" font-size="11" font-weight="700" fill="#34d399">Public Subnet 2</text>
          <text x="10" y="34" font-size="10" fill="#a7f3d0">10.16.16.0/20</text>
          <text x="100" y="75" font-size="11" fill="#64748b" text-anchor="middle" font-style="italic">Available for Public ELB</text>
        </g>

        <!-- Private Subnet 2 -->
        <g transform="translate(10, 165)">
          <rect x="0" y="0" width="200" height="245" rx="8" fill="#1e3a8a" fill-opacity="0.1" stroke="#3b82f6" stroke-width="1.5" />
          <text x="10" y="20" font-size="11" font-weight="700" fill="#38bdf8">Private Subnet 2</text>
          <text x="10" y="34" font-size="10" fill="#93c5fd">10.16.144.0/20</text>

          <!-- Nodes Container -->
          <!-- On-Demand Worker Node -->
          <g transform="translate(10, 80)">
            <rect x="0" y="0" width="180" height="70" rx="6" fill="#0b1329" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4" />
            <rect x="0" y="0" width="180" height="6" rx="3" fill="url(#node-on-demand)" opacity="0.4" />
            <text x="10" y="24" font-size="11" font-weight="800" fill="#94a3b8">Node: On-Demand</text>
            <text x="10" y="42" font-size="10" fill="#64748b">Instance: t3a.medium</text>
            <text x="10" y="56" font-size="9" fill="#64748b">Status: Scale-Up Target</text>
          </g>

          <!-- Spot Worker Node -->
          <g transform="translate(10, 160)">
            <rect x="0" y="0" width="180" height="70" rx="6" fill="#0b1329" stroke="#f59e0b" stroke-width="1.5" />
            <rect x="0" y="0" width="180" height="6" rx="3" fill="url(#node-spot)" />
            <text x="10" y="24" font-size="11" font-weight="800" fill="#e2e8f0">Node: Spot Instance</text>
            <text x="10" y="42" font-size="10" fill="#94a3b8">Instance: c5a / m5a / t3a</text>
            <text x="10" y="56" font-size="9" fill="#f59e0b" font-weight="600">Status: Dynamic Spot Pool</text>
          </g>
        </g>
      </g>

      <!-- ==================== AZ3: us-east-1c ==================== -->
      <g transform="translate(485, 45)">
        <!-- AZ Border -->
        <rect x="0" y="0" width="220" height="420" rx="10" fill="#1e293b" fill-opacity="0.2" stroke="#475569" stroke-width="1" stroke-dasharray="4 4" />
        <text x="110" y="20" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">Availability Zone: us-east-1c</text>

        <!-- Public Subnet 3 -->
        <g transform="translate(10, 30)">
          <rect x="0" y="0" width="200" height="120" rx="8" fill="#065f46" fill-opacity="0.04" stroke="#34d399" stroke-width="1.5" stroke-dasharray="2 2" />
          <text x="10" y="20" font-size="11" font-weight="700" fill="#34d399">Public Subnet 3</text>
          <text x="10" y="34" font-size="10" fill="#a7f3d0">10.16.32.0/20</text>
          <text x="100" y="75" font-size="11" fill="#64748b" text-anchor="middle" font-style="italic">Available for Public ELB</text>
        </g>

        <!-- Private Subnet 3 -->
        <g transform="translate(10, 165)">
          <rect x="0" y="0" width="200" height="245" rx="8" fill="#1e3a8a" fill-opacity="0.1" stroke="#3b82f6" stroke-width="1.5" />
          <text x="10" y="20" font-size="11" font-weight="700" fill="#38bdf8">Private Subnet 3</text>
          <text x="10" y="34" font-size="10" fill="#93c5fd">10.16.160.0/20</text>

          <!-- Nodes Container -->
          <!-- On-Demand Worker Node -->
          <g transform="translate(10, 80)">
            <rect x="0" y="0" width="180" height="70" rx="6" fill="#0b1329" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4" />
            <rect x="0" y="0" width="180" height="6" rx="3" fill="url(#node-on-demand)" opacity="0.4" />
            <text x="10" y="24" font-size="11" font-weight="800" fill="#94a3b8">Node: On-Demand</text>
            <text x="10" y="42" font-size="10" fill="#64748b">Instance: t3a.medium</text>
            <text x="10" y="56" font-size="9" fill="#64748b">Status: Scale-Up Target</text>
          </g>

          <!-- Spot Worker Node -->
          <g transform="translate(10, 160)">
            <rect x="0" y="0" width="180" height="70" rx="6" fill="#0b1329" stroke="#f59e0b" stroke-width="1.5" />
            <rect x="0" y="0" width="180" height="6" rx="3" fill="url(#node-spot)" />
            <text x="10" y="24" font-size="11" font-weight="800" fill="#e2e8f0">Node: Spot Instance</text>
            <text x="10" y="42" font-size="10" fill="#94a3b8">Instance: c5a / m5a / t3a</text>
            <text x="10" y="56" font-size="9" fill="#f59e0b" font-weight="600">Status: Dynamic Spot Pool</text>
          </g>
        </g>
      </g>

      <!-- ==================== EKS CLUSTER CONTROL PLANE OVERLAY ==================== -->
      <g transform="translate(95, 185)">
        <rect x="0" y="0" width="530" height="42" rx="21" fill="#1e113a" fill-opacity="0.8" stroke="#a855f7" stroke-width="2.5" filter="url(#glow-purple)" />
        
        <!-- EKS Logo shape -->
        <polygon points="25,12 34,17 34,27 25,32 16,27 16,17" fill="none" stroke="#d946ef" stroke-width="2" />
        <circle cx="25" cy="22" r="3" fill="#d946ef" />

        <text x="50" y="26" font-size="13" font-weight="800" fill="#ffffff">Amazon EKS Cluster Control Plane</text>
        <text x="270" y="26" font-size="11" fill="#c084fc">dev-ap-medium-eks-cluster</text>
        <text x="475" y="26" font-size="12" font-weight="800" fill="#e9d5ff">Kubernetes 1.33</text>
      </g>
    </g>

    <!-- Outgoing route arrow from Public NAT GW to IGW -->
    <path d="M125 148 L125 130 L380 130 L380 52" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-green)" />
    
    <!-- Private Route arrow to NAT GW -->
    <!-- Private subnet 2 and 3 traffic mapping to NAT GW -->
    <path d="M420 365 L420 180 L140 180 M655 365 L655 180" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-blue)" />
  </g>

  <!-- Outside Internet Icon & connection -->
  <g transform="translate(395, 20)">
    <path d="M18 10 A10 10 0 0 1 35 15 A12 12 0 0 1 45 30 L5 30 A8 8 0 0 1 18 10 Z" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" />
    <text x="25" y="24" font-size="9" fill="#94a3b8" font-weight="bold" text-anchor="middle">Internet</text>
    <!-- Arrow connecting Internet to IGW -->
    <path d="M25 30 L25 62" fill="none" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow-blue)" />
  </g>
</svg>
