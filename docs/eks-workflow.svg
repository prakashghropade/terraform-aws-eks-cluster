<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640" style="background:#090d16;">
  <defs>
    <!-- Custom Designer Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap');
      text {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      }
      .title {
        font-weight: 800;
        font-size: 26px;
        fill: #ffffff;
        letter-spacing: -0.02em;
      }
      .subtitle {
        font-weight: 500;
        font-size: 13px;
        fill: #64748b;
        letter-spacing: 0.05em;
      }
      .badge-text {
        font-weight: 700;
        font-size: 10px;
        fill: #090d16;
        letter-spacing: 0.05em;
      }
      .card-title {
        font-weight: 700;
        font-size: 12px;
        fill: #f8fafc;
      }
      .card-subtitle {
        font-weight: 500;
        font-size: 10px;
        fill: #94a3b8;
      }
      .card-status {
        font-weight: 700;
        font-size: 9px;
      }
    </style>

    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1.2" opacity="0.15" />
    </pattern>

    <!-- Glowing Auroras -->
    <radialGradient id="aurora-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#090d16" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="aurora-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#090d16" stop-opacity="0" />
    </radialGradient>

    <!-- Custom Gradients -->
    <linearGradient id="eks-border-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="node-on-demand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="node-spot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Soft Glass Drop Shadow -->
    <filter id="glass-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.65" />
    </filter>
    <filter id="glow-orange" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Flow Markers -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#10b981" />
    </marker>
  </defs>

  <!-- Canvas Background & Grid -->
  <rect width="100%" height="100%" fill="#090d16" />
  <circle cx="480" cy="300" r="350" fill="url(#aurora-purple)" />
  <circle cx="200" cy="450" r="250" fill="url(#aurora-cyan)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- CENTURED TITLE -->
  <g transform="translate(480, 50)" text-anchor="middle">
    <text x="0" y="0" class="title">EKS Cluster Topology</text>
    <text x="0" y="24" class="subtitle">TERRAFORM MANAGED • DEV ENVIRONMENT</text>
  </g>

  <!-- ==================== AWS INFRASTRUCTURE ==================== -->
  <g transform="translate(50, 110)">
    <!-- AWS Cloud Glassmorphic Outer Card -->
    <rect x="0" y="0" width="860" height="490" rx="24" fill="#0f172a" fill-opacity="0.4" stroke="#ff9900" stroke-width="1.8" filter="url(#glass-shadow)" />
    
    <!-- AWS Cloud Badge -->
    <g transform="translate(30, -12)">
      <rect x="0" y="0" width="100" height="24" rx="12" fill="#ff9900" filter="url(#glow-orange)" />
      <text x="50" y="15" class="badge-text" text-anchor="middle">AWS CLOUD</text>
    </g>
    <text x="145" y="16" font-size="11" font-weight="700" fill="#ff9900" opacity="0.8">us-east-1 Region</text>

    <!-- Internet Gateway (IGW) Card -->
    <g transform="translate(370, 20)">
      <rect x="0" y="0" width="120" height="36" rx="10" fill="#0284c7" fill-opacity="0.3" stroke="#38bdf8" stroke-width="1.5" />
      <!-- IGW Icon -->
      <circle cx="22" cy="18" r="6" fill="none" stroke="#38bdf8" stroke-width="1.5" />
      <path d="M22 8 L22 12 M22 24 L22 28 M12 18 L16 18 M28 18 L32 18" stroke="#38bdf8" stroke-width="1.5" />
      <text x="42" y="22" font-size="11" font-weight="800" fill="#ffffff">IGW</text>
      <text x="42" y="31" font-size="8.5" fill="#bae6fd">internet-gateway</text>
    </g>

    <!-- VPC Card -->
    <g transform="translate(20, 75)">
      <rect x="0" y="0" width="820" height="395" rx="18" fill="#121e36" fill-opacity="0.6" stroke="#06b6d4" stroke-width="1.5" />
      
      <!-- VPC Header -->
      <text x="25" y="28" font-size="13" font-weight="800" fill="#22d3ee" letter-spacing="0.02em">Virtual Private Cloud (VPC)</text>
      <text x="200" y="28" font-size="10.5" font-weight="600" fill="#67e8f9" opacity="0.8">10.16.0.0/16</text>

      <!-- Active Cluster Info Badge -->
      <g transform="translate(485, 12)">
        <rect x="0" y="0" width="310" height="24" rx="12" fill="#1e1b4b" fill-opacity="0.9" stroke="url(#eks-border-grad)" stroke-width="1.2" />
        <circle cx="15" cy="12" r="4" fill="#a855f7" />
        <text x="28" y="16" font-size="9" font-weight="700" fill="#e9d5ff">ADDONS: vpc-cni | coredns | kube-proxy | ebs-csi</text>
      </g>

      <!-- ==================== AVAILABILITY ZONE 1 ==================== -->
      <g transform="translate(15, 50)">
        <rect x="0" y="0" width="245" height="325" rx="12" fill="#1e293b" fill-opacity="0.25" stroke="#475569" stroke-width="1" stroke-dasharray="5 5" />
        <text x="122" y="20" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle">Zone: us-east-1a</text>

        <!-- Public Subnet 1 -->
        <g transform="translate(10, 32)">
          <rect x="0" y="0" width="225" height="92" rx="10" fill="#065f46" fill-opacity="0.08" stroke="#34d399" stroke-width="1.2" />
          <text x="12" y="20" font-size="10" font-weight="700" fill="#34d399">Public Subnet 1</text>
          <text x="12" y="32" font-size="8.5" fill="#a7f3d0">10.16.0.0/20</text>
          
          <!-- NAT Gateway -->
          <g transform="translate(10, 42)">
            <rect x="0" y="0" width="205" height="42" rx="8" fill="#047857" fill-opacity="0.85" stroke="#10b981" stroke-width="1.2" />
            <!-- Router gear look -->
            <circle cx="22" cy="21" r="5" fill="none" stroke="#ffffff" stroke-width="1.5" />
            <path d="M17 21 L27 21 M22 16 L22 26" stroke="#ffffff" stroke-width="1.2" />
            <text x="38" y="20" font-size="11" font-weight="800" fill="#ffffff">NAT Gateway</text>
            <text x="38" y="30" font-size="8.5" fill="#a7f3d0">eip-ngw (Elastic IP)</text>
          </g>
        </g>

        <!-- Private Subnet 1 -->
        <g transform="translate(10, 134)">
          <rect x="0" y="0" width="225" height="180" rx="10" fill="#1e3a8a" fill-opacity="0.08" stroke="#3b82f6" stroke-width="1.2" />
          <text x="12" y="20" font-size="10" font-weight="700" fill="#38bdf8">Private Subnet 1</text>
          <text x="12" y="32" font-size="8.5" fill="#93c5fd">10.16.128.0/20</text>

          <!-- On-Demand Node -->
          <g transform="translate(10, 45)">
            <rect x="0" y="0" width="205" height="56" rx="8" fill="#0d1527" stroke="#10b981" stroke-width="1.2" />
            <!-- Status glow dot -->
            <circle cx="188" cy="15" r="3.5" fill="#10b981" />
            <!-- Chip/CPU Icon -->
            <rect x="12" y="18" width="16" height="16" rx="3" fill="none" stroke="#34d399" stroke-width="1.5" />
            <path d="M12 23 L9 23 M12 29 L9 29 M16 18 L16 15 M24 18 L24 15 M28 23 L31 23 M28 29 L31 29 M16 34 L16 37 M24 34 L24 37" stroke="#34d399" stroke-width="1.2" />
            
            <text x="36" y="24" class="card-title">Node: On-Demand</text>
            <text x="36" y="36" class="card-subtitle">t3a.medium (Desired: 1)</text>
            <text x="36" y="47" class="card-status" fill="#10b981">Active &amp; Ready</text>
          </g>

          <!-- Spot Node -->
          <g transform="translate(10, 112)">
            <rect x="0" y="0" width="205" height="56" rx="8" fill="#0d1527" stroke="#fbbf24" stroke-width="1.2" />
            <!-- Lightning Bolt Icon -->
            <path d="M18 15 L26 15 L21 26 L27 26 L17 38 L21 26 L15 26 Z" fill="#fbbf24" />
            
            <text x="36" y="24" class="card-title">Node: Spot Instance</text>
            <text x="36" y="36" class="card-subtitle">c5a / m5a / t3a (Min: 1, Max: 10)</text>
            <text x="36" y="47" class="card-status" fill="#fbbf24">Scale Pool Active</text>
          </g>
        </g>
      </g>

      <!-- ==================== AVAILABILITY ZONE 2 ==================== -->
      <g transform="translate(285, 50)">
        <rect x="0" y="0" width="245" height="325" rx="12" fill="#1e293b" fill-opacity="0.25" stroke="#475569" stroke-width="1" stroke-dasharray="5 5" />
        <text x="122" y="20" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle">Zone: us-east-1b</text>

        <!-- Public Subnet 2 -->
        <g transform="translate(10, 32)">
          <rect x="0" y="0" width="225" height="92" rx="10" fill="#065f46" fill-opacity="0.02" stroke="#34d399" stroke-width="1" stroke-dasharray="3 3" />
          <text x="12" y="20" font-size="10" font-weight="700" fill="#34d399">Public Subnet 2</text>
          <text x="12" y="32" font-size="8.5" fill="#a7f3d0">10.16.16.0/20</text>
          <text x="112" y="60" font-size="10" fill="#64748b" text-anchor="middle" font-style="italic">Available for Public ELB</text>
        </g>

        <!-- Private Subnet 2 -->
        <g transform="translate(10, 134)">
          <rect x="0" y="0" width="225" height="180" rx="10" fill="#1e3a8a" fill-opacity="0.08" stroke="#3b82f6" stroke-width="1.2" />
          <text x="12" y="20" font-size="10" font-weight="700" fill="#38bdf8">Private Subnet 2</text>
          <text x="12" y="32" font-size="8.5" fill="#93c5fd">10.16.144.0/20</text>

          <!-- On-Demand Node (Target for scaling) -->
          <g transform="translate(10, 45)">
            <rect x="0" y="0" width="205" height="56" rx="8" fill="#0d1527" fill-opacity="0.4" stroke="#10b981" stroke-opacity="0.4" stroke-width="1.2" />
            <!-- Chip/CPU Icon -->
            <rect x="12" y="18" width="16" height="16" rx="3" fill="none" stroke="#34d399" stroke-opacity="0.4" stroke-width="1.5" />
            <path d="M12 23 L9 23 M12 29 L9 29 M16 18 L16 15 M24 18 L24 15" stroke="#34d399" stroke-opacity="0.4" stroke-width="1.2" />
            
            <text x="36" y="24" class="card-title" fill="#64748b">Node: On-Demand</text>
            <text x="36" y="36" class="card-subtitle" fill="#475569">t3a.medium</text>
            <text x="36" y="47" class="card-status" fill="#64748b">Scale-Up Target</text>
          </g>

          <!-- Spot Node -->
          <g transform="translate(10, 112)">
            <rect x="0" y="0" width="205" height="56" rx="8" fill="#0d1527" stroke="#fbbf24" stroke-width="1.2" />
            <!-- Lightning Bolt Icon -->
            <path d="M18 15 L26 15 L21 26 L27 26 L17 38 L21 26 L15 26 Z" fill="#fbbf24" />
            
            <text x="36" y="24" class="card-title">Node: Spot Instance</text>
            <text x="36" y="36" class="card-subtitle">c5a / m5a / t3a (Min: 1, Max: 10)</text>
            <text x="36" y="47" class="card-status" fill="#fbbf24">Scale Pool Active</text>
          </g>
        </g>
      </g>

      <!-- ==================== AVAILABILITY ZONE 3 ==================== -->
      <g transform="translate(555, 50)">
        <rect x="0" y="0" width="245" height="325" rx="12" fill="#1e293b" fill-opacity="0.25" stroke="#475569" stroke-width="1" stroke-dasharray="5 5" />
        <text x="122" y="20" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle">Zone: us-east-1c</text>

        <!-- Public Subnet 3 -->
        <g transform="translate(10, 32)">
          <rect x="0" y="0" width="225" height="92" rx="10" fill="#065f46" fill-opacity="0.02" stroke="#34d399" stroke-width="1" stroke-dasharray="3 3" />
          <text x="12" y="20" font-size="10" font-weight="700" fill="#34d399">Public Subnet 3</text>
          <text x="12" y="32" font-size="8.5" fill="#a7f3d0">10.16.32.0/20</text>
          <text x="112" y="60" font-size="10" fill="#64748b" text-anchor="middle" font-style="italic">Available for Public ELB</text>
        </g>

        <!-- Private Subnet 3 -->
        <g transform="translate(10, 134)">
          <rect x="0" y="0" width="225" height="180" rx="10" fill="#1e3a8a" fill-opacity="0.08" stroke="#3b82f6" stroke-width="1.2" />
          <text x="12" y="20" font-size="10" font-weight="700" fill="#38bdf8">Private Subnet 3</text>
          <text x="12" y="32" font-size="8.5" fill="#93c5fd">10.16.160.0/20</text>

          <!-- On-Demand Node (Target for scaling) -->
          <g transform="translate(10, 45)">
            <rect x="0" y="0" width="205" height="56" rx="8" fill="#0d1527" fill-opacity="0.4" stroke="#10b981" stroke-opacity="0.4" stroke-width="1.2" />
            <!-- Chip/CPU Icon -->
            <rect x="12" y="18" width="16" height="16" rx="3" fill="none" stroke="#34d399" stroke-opacity="0.4" stroke-width="1.5" />
            <path d="M12 23 L9 23 M12 29 L9 29 M16 18 L16 15" stroke="#34d399" stroke-opacity="0.4" stroke-width="1.2" />
            
            <text x="36" y="24" class="card-title" fill="#64748b">Node: On-Demand</text>
            <text x="36" y="36" class="card-subtitle" fill="#475569">t3a.medium</text>
            <text x="36" y="47" class="card-status" fill="#64748b">Scale-Up Target</text>
          </g>

          <!-- Spot Node -->
          <g transform="translate(10, 112)">
            <rect x="0" y="0" width="205" height="56" rx="8" fill="#0d1527" stroke="#fbbf24" stroke-width="1.2" />
            <!-- Lightning Bolt Icon -->
            <path d="M18 15 L26 15 L21 26 L27 26 L17 38 L21 26 L15 26 Z" fill="#fbbf24" />
            
            <text x="36" y="24" class="card-title">Node: Spot Instance</text>
            <text x="36" y="36" class="card-subtitle">c5a / m5a / t3a (Min: 1, Max: 10)</text>
            <text x="36" y="47" class="card-status" fill="#fbbf24">Scale Pool Active</text>
          </g>
        </g>
      </g>

      <!-- ==================== EKS CLUSTER CONTROL PLANE OVERLAY ==================== -->
      <g transform="translate(130, 160)">
        <rect x="0" y="0" width="560" height="38" rx="19" fill="#15102a" stroke="url(#eks-border-grad)" stroke-width="2" filter="url(#glass-shadow)" />
        
        <!-- EKS Logo Shape (3D Hexagon) -->
        <polygon points="25,10 33,14 33,24 25,28 17,24 17,14" fill="#a855f7" />
        <polygon points="25,10 25,28 17,24 17,14" fill="#d946ef" opacity="0.7" />
        <circle cx="25" cy="19" r="2.5" fill="#ffffff" />

        <text x="45" y="24" font-size="12" font-weight="800" fill="#ffffff">Amazon EKS Control Plane</text>
        <text x="212" y="24" font-size="10.5" font-weight="600" fill="#c084fc">dev-ap-medium-eks-cluster</text>
        <rect x="475" y="9" width="70" height="20" rx="10" fill="#6366f1" fill-opacity="0.3" stroke="#818cf8" stroke-width="1" />
        <text x="510" y="22" font-size="9.5" font-weight="800" fill="#e0e7ff" text-anchor="middle">v1.33</text>
      </g>
    </g>

    <!-- Smooth Bezier connection: NAT GW to IGW -->
    <path d="M137 147 C137 80 430 80 430 56" fill="none" stroke="#10b981" stroke-width="1.8" stroke-dasharray="3 3" marker-end="url(#arrow-green)" />
    
    <!-- Smooth Bezier connections: Private Subnet Route Tables to NAT Gateway -->
    <path d="M422 360 C422 280 232 300 232 232 M692 360 C692 260 232 340 232 232" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="3 3" marker-end="url(#arrow-blue)" />
  </g>

  <!-- Stylized Cloud for External Internet -->
  <g transform="translate(435, 15)">
    <!-- Custom Cloud Path -->
    <path d="M25 45 A 15 15 0 0 1 35 30 A 20 20 0 0 1 65 25 A 18 18 0 0 1 90 37 A 15 15 0 0 1 100 45 C 108 45 115 52 115 60 C 115 68 108 75 100 75 L 25 75 C 17 75 10 68 10 60 C 10 52 17 45 25 45 Z" fill="#1e293b" fill-opacity="0.6" stroke="#38bdf8" stroke-width="1.5" />
    <text x="62" y="58" font-size="10" fill="#bae6fd" font-weight="800" text-anchor="middle">Internet</text>
    <!-- Arrow connecting Internet to IGW -->
    <path d="M62.5 75 C62.5 90 45 90 45 106" fill="none" stroke="#38bdf8" stroke-width="1.8" marker-end="url(#arrow-blue)" />
  </g>
</svg>
